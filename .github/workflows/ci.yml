name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build_test_lint:
    name: Build, Test, and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run code linting
        run: bun run lint

      - name: Build project
        run: bun run build

      - name: Build CLI
        run: bun run build:cli

      - name: Run test suite
        run: bun run test
